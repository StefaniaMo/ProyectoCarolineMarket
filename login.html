<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Caroline Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body class="auth-body">

    <div class="auth-card my-4">
        <div class="text-center mb-4">
            <a href="index.html" class="auth-brand">Caroline Market</a>
            <p class="text-muted small mt-2">Ingresa tus datos para continuar</p>
        </div>

        <form id="form-login">
            <div class="mb-3">
                <label for="login-email" class="form-label small fw-medium text-secondary">Correo electrónico</label>
                <input type="email" id="login-email" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>
            
            <div class="mb-4">
                <label for="login-password" class="form-label small fw-medium text-secondary">Contraseña</label>
                <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-dark w-100 btn-auth-submit">Iniciar Sesión</button>
        </form>

        <div class="auth-divider">o también puedes</div>

        <button id="btn-invitado" class="btn btn-outline-secondary btn-auth-submit w-100">
            Entrar como invitado
        </button>

        <div class="text-center mt-4 pt-2 border-top">
            <p class="small text-muted mb-0">
                ¿No tienes cuenta? <a href="registro.html" class="auth-link">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/login.js"></script>
</body>
</html>
